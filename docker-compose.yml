services:
  postgres:
    image: postgres:17-alpine
    container_name: connectour-db
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$DB_USER -d $$DB_NAME']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
